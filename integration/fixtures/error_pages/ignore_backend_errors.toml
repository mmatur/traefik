[global]
  checkNewVersion = false
  sendAnonymousUsage = false

[log]
  level = "DEBUG"

[entryPoints]
  [entryPoints.web]
    address = ":8080"

[providers.file]
  filename = "{{ .SelfFilename }}"

## dynamic configuration ##

[http.routers]
  [http.routers.router1]
    rule = "Host(`test.local`)"
    service = "service1"
    middlewares = ["error"]
  [http.routers.router2]
    rule = "Host(`test2.local`)"
    service = "service2"
    middlewares = ["error"]
  [http.routers.router3]
    rule = "Host(`test3.local`)"
    service = "service3"
    middlewares = ["error"]

[http.middlewares]
  [http.middlewares.error.errors]
    status = ["200", "500-599"]
    service = "error"
    query = "/50x.html"
    ignoreBackendErrors = true

[http.services]
  [http.services.service1.loadBalancer]
    passHostHeader = true
    [[http.services.service1.loadBalancer.servers]]
      url = "{{.Server1}}"

  [http.services.service2.loadBalancer]
    [[http.services.service2.loadBalancer.servers]]

  [http.services.service3.loadBalancer]
    [http.services.service3.loadBalancer.servers]

  [http.services.error.loadBalancer]
    [[http.services.error.loadBalancer.servers]]
      url = "http://{{.Server2}}:80"
